<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login | EcoSave Market</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <main class="auth-page">
    <div class="container auth-layout">
      <section class="auth-copy">
        <div class="section-pill">Account Access</div>
        <h1>Welcome back to EcoSave.</h1>
        <p>Sign in as a customer to manage reservations, or as a store partner to review incoming pickups.</p>
      </section>
      <form class="reservation-form auth-form" id="loginForm" novalidate>
        <h2>Login</h2>
        <label>Email<input id="email" name="email" type="email" autocomplete="email" required /></label>
        <label>Password<input id="password" name="password" type="password" autocomplete="current-password" required /></label>
        <p class="form-error" id="authError">Email or password is incorrect.</p>
        <button class="btn btn--primary" type="submit">Login</button>
        <p class="auth-switch">New to EcoSave? <a href="register.html">Create an account</a></p>
      </form>
    </div>
  </main>
  <script src="js/layout.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/script.js"></script>
</body>
</html>
